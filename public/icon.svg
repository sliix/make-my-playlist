<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120f20" />
      <stop offset="100%" stop-color="#0a0812" />
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55" />
      <stop offset="100%" stop-color="#8e2de2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect width="504" height="504" x="4" y="4" rx="108" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="8" />
  
  <!-- Logo Icon -->
  <g transform="translate(116, 100) scale(11)" filter="url(#glow)">
    <path d="M9 18V5l12-2v13" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="18" r="3" fill="none" stroke="url(#logo-grad)" stroke-width="2.5"/>
    <circle cx="18" cy="16" r="3" fill="none" stroke="url(#logo-grad)" stroke-width="2.5"/>
  </g>
</svg>
